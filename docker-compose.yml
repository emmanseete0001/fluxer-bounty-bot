# compose file for the database
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bountybot
      POSTGRES_PASSWORD: bountybot
      POSTGRES_DB: bountybot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
