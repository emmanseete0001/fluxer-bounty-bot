name: Build & Deploy to Rancher

on:
    push:
        branches:
            - master

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        outputs:
            image_tag: ${{ steps.meta.outputs.tags }}
        
        steps:
            - name: Checkout code
              uses: actions/checkout@7

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Extract Docker metadata (tags & labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                  type=sha,prefix=sha-
                  type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
            - name: Trigger Rancher Redeploy
              env:
                RANCHER_URL: ${{ secrets.RANCHER_URL }}
                RANCHER_TOKEN: ${{ secrets.RANCHER_TOKEN }}
                # Find your Project ID in the Rancher URL when viewing your cluster/project
                PROJECT_ID: "c-nj4k9" 
                NAMESPACE: "fh-pilkey-fluxer-bounty-bot"
                WORKLOAD_NAME: "bot"
              run: |
                curl -X POST \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  "$RANCHER_URL/v3/project/$PROJECT_ID/workloads/deployment:$NAMESPACE:$WORKLOAD_NAME?action=redeploy"